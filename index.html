<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Cleaner Pro | Duo Link Studio</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --accent: #58a6ff;
            --success: #238636;
            --text: #c9d1d9;
            --border: #30363d;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            padding: 50px 20px;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        h2 { color: #fff; margin-bottom: 5px; font-weight: 600; }
        p { color: #8b949e; margin-bottom: 20px; font-size: 14px; }

        /* Style for the new Exclude Input */
        .exclude-box {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .exclude-box label { font-size: 12px; color: var(--accent); font-weight: bold; text-transform: uppercase; }
        .exclude-input {
            background: #010409;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 15px;
            color: #fff;
            outline: none;
            transition: 0.3s;
        }
        .exclude-input:focus { border-color: var(--accent); }
        
        textarea {
            width: 100%;
            height: 300px;
            background: #010409;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: #79c0ff;
            padding: 15px;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            box-sizing: border-box;
            resize: vertical;
            outline: none;
            transition: border 0.3s;
        }
        textarea:focus { border-color: var(--accent); }

        .controls {
            margin-top: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }
        
        button {
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid rgba(240,246,252,0.1);
            transition: 0.2s cubic-bezier(0.3, 0, 0.5, 1);
            font-size: 14px;
        }

        .btn-primary { background: var(--success); color: #fff; }
        .btn-primary:hover { background: #2ea043; }

        .btn-secondary { background: #21262d; color: #c9d1d9; }
        .btn-secondary:hover { background: #30363d; border-color: #8b949e; }

        .stats { margin-left: auto; color: #8b949e; font-size: 13px; }
        
        #toast {
            visibility: hidden;
            min-width: 200px;
            background-color: var(--accent);
            color: #000;
            text-align: center;
            border-radius: 4px;
            padding: 12px;
            position: fixed;
            z-index: 1;
            bottom: 30px;
            font-weight: bold;
            left: 50%;
            transform: translateX(-50%);
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }

        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

<div class="container">
    <h2>Lead Deduplicator</h2>
    <p>Filter unique leads and exclude your own email address.</p>
    
    <div class="exclude-box">
        <label>Your Email (To Remove from List):</label>
        <input type="email" id="excludeEmail" class="exclude-input" placeholder="e.g. yourname@gmail.com">
    </div>

    <textarea id="inputData" placeholder="Paste your bulk list here..."></textarea>
    
    <div class="controls">
        <button class="btn-primary" onclick="processLeads()">1. Filter & Clean</button>
        <button class="btn-secondary" onclick="copyToClipboard()">2. Copy Results</button>
        <button class="btn-secondary" style="color: #f85149;" onclick="clearAll()">Clear</button>
        
        <div class="stats" id="stats">Input: 0 | Unique: 0</div>
    </div>
</div>

<div id="toast">Task Completed!</div>

<script>
    function processLeads() {
        const input = document.getElementById('inputData');
        const stats = document.getElementById('stats');
        const excludeEmail = document.getElementById('excludeEmail').value.trim().toLowerCase();
        
        // 1. Split into array and clean whitespace
        let rawList = input.value.split(/\r?\n/).map(item => item.trim()).filter(item => item !== "");
        
        // 2. Remove Duplicates using Set
        let uniqueList = [...new Set(rawList)];
        
        // 3. Exclude your specific email (Interesting change)
        if (excludeEmail !== "") {
            uniqueList = uniqueList.filter(email => email.toLowerCase() !== excludeEmail);
        }

        uniqueList.sort();
        
        input.value = uniqueList.join("\n");
        stats.innerText = `Input: ${rawList.length} | Unique: ${uniqueList.length} | Removed: ${rawList.length - uniqueList.length}`;
        
        showToast("Filtered & Excluded Successfully!");
    }

    function copyToClipboard() {
        const copyText = document.getElementById("inputData");
        if (!copyText.value) return;

        copyText.select();
        copyText.setSelectionRange(0, 99999);
        navigator.clipboard.writeText(copyText.value);
        
        showToast("Copied to Clipboard!");
    }

    function clearAll() {
        document.getElementById('inputData').value = "";
        document.getElementById('excludeEmail').value = "";
        document.getElementById('stats').innerText = "Input: 0 | Unique: 0";
    }

    function showToast(msg) {
        const x = document.getElementById("toast");
        x.innerText = msg;
        x.className = "show";
        setTimeout(function(){ x.className = x.className.replace("show", ""); }, 3000);
    }
</script>

</body>
</html>
